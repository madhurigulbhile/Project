<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logout - StartSmart AI</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif;}
body {background: linear-gradient(135deg,#0f172a,#1e293b); color:#f8f9fa; display:flex; justify-content:center; align-items:center; height:100vh;}
.logout-container {text-align:center; background:rgba(255,255,255,0.05); padding:40px 60px; border-radius:20px; backdrop-filter:blur(12px); box-shadow:0 15px 30px rgba(0,0,0,0.25);}
.logout-container h1 {font-size:36px; margin-bottom:20px; font-weight:600; color:#fff;}
.logout-container p {font-size:18px; color:#cbd5f5; margin-bottom:30px;}
.logout-btn {padding:14px 28px; font-size:16px; border:none; border-radius:12px; background:linear-gradient(135deg,#6b21a8,#db2777); color:#fff; cursor:pointer; font-weight:500; transition:opacity 0.2s, transform 0.2s;}
.logout-btn:hover {opacity:0.95; transform:translateY(-2px);}
</style>
</head>
<body>

<div class="logout-container">
  <h1>Logged Out Successfully</h1>
  <p>You have been logged out of StartSmart AI.</p>
  <button class="logout-btn" onclick="redirectToLogin()">Go to Login</button>
</div>

<script>
function redirectToLogin() {
  // Replace 'login.html' with your actual login page
  window.location.href = 'login.html';
}
</script>

</body>
</html>
