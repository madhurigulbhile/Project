<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | StartSmart AI</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
/* GLOBAL */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#0f172a,#020617);color:white;}
/* CARD */
.register-card{width:420px;background:rgba(255,255,255,0.05);padding:40px;border-radius:16px;backdrop-filter:blur(15px);box-shadow:0 10px 30px rgba(0,0,0,0.4);text-align:center;}
.register-card h2{margin-bottom:20px;}
input, select{width:100%;padding:12px;margin:10px 0;border:none;border-radius:8px;outline:none;}
button{width:100%;padding:12px;border:none;border-radius:8px;background:linear-gradient(45deg,#7c3aed,#ec4899);color:white;cursor:pointer;margin-top:10px;}
button:hover{opacity:0.9;}
.roles{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0;}
.role{padding:6px 12px;border-radius:20px;border:1px solid #7c3aed;cursor:pointer;font-size:13px;}
.role.active{background:#7c3aed;}
#msg{margin-top:10px;font-size:14px;}
a{color:#cbd5f5;text-decoration:none;font-size:14px;}
a:hover{color:white;}
</style>
</head>

<body>
<div class="register-card">
<h2>🚀 Create Account</h2>

<form id="registerForm">

<input type="text" id="name" placeholder="Full Name" required>
<input type="email" id="email" placeholder="Email" required>
<input type="password" id="password" placeholder="Password" required>
<input type="text" id="field" placeholder="Startup Field">

<!-- ROLE -->
<div class="roles">
<div class="role">Startup</div>
<div class="role">Investor</div>
<div class="role">Mentor</div>
<div class="role">Student</div>
</div>

<select id="experience">
<option value="" disabled selected>Experience Level</option>
<option>Beginner</option>
<option>Intermediate</option>
<option>Experienced</option>
</select>

<button type="submit">Register</button>
<p id="msg"></p>
</form>

<p style="margin-top:15px;">
Already have account? <a href="login.html">Login</a>
</p>
</div>

<script>
// ROLE SELECT
let roles = document.querySelectorAll(".role");
let selectedRole = "";
roles.forEach(role=>{
  role.onclick = function(){
    roles.forEach(r=>r.classList.remove("active"));
    this.classList.add("active");
    selectedRole = this.innerText;
  }
});

// REGISTER API
document.getElementById("registerForm").addEventListener("submit", async function(e){
e.preventDefault();
const msg = document.getElementById("msg");

// VALIDATION
if(!selectedRole){msg.style.color="red"; msg.innerText="Please select a role!"; return;}
if(!document.getElementById("experience").value){msg.style.color="red"; msg.innerText="Please select experience!"; return;}

const user = {
name: document.getElementById("name").value,
email: document.getElementById("email").value,
password: document.getElementById("password").value,
field: document.getElementById("field").value,
role: selectedRole,
experience: document.getElementById("experience").value
};

try{
const res = await fetch("http://localhost:5000/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(user)
});
const data = await res.json();

if(data.message.toLowerCase().includes("success")){
msg.style.color="lightgreen";
msg.innerText = "Registration successful ✅";
setTimeout(()=>{window.location.href = "login.html";},1500);
}else{
msg.style.color="red";
msg.innerText = data.message;
}
}catch(error){
msg.style.color="red";
msg.innerText = "Server not running ❌";
}
});
</script>
</body>
</html>
