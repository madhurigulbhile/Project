<script>
const API_KEY = "AIzaSyBvyfhZX7PZhSo208yJHSgSCp8rbU5XFx8"; // Replace with your API key

// Robust fetch with retries and error handling
async function fetchBooks(query, containerId, retries = 2) {
    const container = document.getElementById(containerId);
    container.innerHTML = "Loading...";

    try {
        const url = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}&maxResults=8&key=${API_KEY}`;
        let res = await fetch(url);

        if (!res.ok) {
            if (res.status === 503 && retries > 0) {
                console.warn(`503 received. Retrying... (${retries} retries left)`);
                await new Promise(r => setTimeout(r, 1000));
                return fetchBooks(query, containerId, retries - 1);
            } else if (res.status === 400 || res.status === 403) {
                container.innerHTML = "❌ API key invalid or quota exceeded.";
                return;
            } else {
                throw new Error("API Error: " + res.status);
            }
        }

        const data = await res.json();

        if (!data.items || data.items.length === 0) {
            container.innerHTML = "<p>No books found.</p>";
            return;
        }

        displayBooks(data, containerId);

    } catch (error) {
        console.error(error);
        container.innerHTML = "❌ Network error or API unavailable. Please try again later.";
    }
}

// Display books
function displayBooks(data, containerId) {
    const container = document.getElementById(containerId);
    container.innerHTML = "";

    data.items.forEach(book => {
        const info = book.volumeInfo || {};
        const title = info.title || "No Title";
        const authors = info.authors ? info.authors.join(", ") : "Unknown";
        const image = info.imageLinks?.thumbnail || "https://via.placeholder.com/150";
        const preview = info.previewLink || "#";
        const infoLink = info.infoLink || "#";

        const div = document.createElement("div");
        div.className = "book";
        div.innerHTML = `
            <img src="${image}">
            <h4>${title}</h4>
            <p>${authors}</p>
            <button class="read-btn" onclick="window.open('${preview}')">Read</button>
            <button class="info-btn" onclick="window.open('${infoLink}')">Info</button>
        `;
        container.appendChild(div);
    });
}

// Search function
function searchBooks() {
    const query = document.getElementById("searchInput").value.trim();
    if (!query) {
        alert("Please enter a search term.");
        return;
    }
    fetchBooks(query, "trending");
}

// Add click event listener to search button
document.getElementById("searchBtn").addEventListener("click", searchBooks);

// Enter key triggers search
document.getElementById("searchInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") searchBooks();
});

// Load default books
function loadBooks() {
    fetchBooks("business", "trending");
    fetchBooks("self improvement", "popular");
}

loadBooks();
</script>
