<script>
const API_KEY = "AIzaSyBvyfhZX7PZhSo208yJHSgSCp8rbU5XFx8"; 

// Fetch Books
async function fetchBooks(query, containerId) {
    const container = document.getElementById(containerId);
    container.innerHTML = "Loading...";

    try {
        const url = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}&maxResults=8&key=${API_KEY}`;
        const res = await fetch(url);

        const data = await res.json();

        if (!data.items) {
            container.innerHTML = "No books found";
            return;
        }

        displayBooks(data, containerId);

    } catch (err) {
        container.innerHTML = "Error loading books";
    }
}

// Display Books with FREE / PAID
function displayBooks(data, containerId) {
    const container = document.getElementById(containerId);
    container.innerHTML = "";

    data.items.forEach(book => {

        const info = book.volumeInfo || {};
        const sale = book.saleInfo || {};

        const title = info.title || "No Title";
        const authors = info.authors ? info.authors.join(", ") : "Unknown";
        const image = info.imageLinks?.thumbnail || "https://via.placeholder.com/150";
        const preview = info.previewLink || "#";
        const infoLink = info.infoLink || "#";

        // FREE / PAID logic
        let priceLabel = "Unavailable";
        let color = "gray";

        if (sale.saleability === "FREE") {
            priceLabel = "FREE";
            color = "green";
        } else if (sale.saleability === "FOR_SALE") {
            priceLabel = "PAID";
            color = "red";
        }

        const div = document.createElement("div");
        div.className = "book";

        div.innerHTML = `
            <img src="${image}">
            <h4>${title}</h4>
            <p>${authors}</p>

            <span style="
                display:inline-block;
                padding:5px 10px;
                border-radius:20px;
                font-size:12px;
                background:${color};
                color:white;
                margin-bottom:8px;">
                ${priceLabel}
            </span>

            <br>

            <button class="read-btn" onclick="window.location.href = '${preview}'">Read</button>
            <button class="info-btn" onclick="window.location.href = '${infoLink}'">Info</button>
        `;

        container.appendChild(div);
    });
}

// Search
function searchBooks() {
    const query = document.getElementById("searchInput").value.trim();
    if (!query) {
        alert("Enter something!");
        return;
    }
    fetchBooks(query, "trending");
}

document.getElementById("searchBtn").addEventListener("click", searchBooks);

// Default load
function loadBooks() {
    fetchBooks("business", "trending");
    fetchBooks("self improvement", "popular");
}

loadBooks();
</script>
