<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | StartSmart AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:white;
}
.container{
  width:380px;
  background:rgba(255,255,255,0.05);
  padding:40px;
  border-radius:16px;
  backdrop-filter:blur(15px);
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}
input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:8px;
  outline:none;
}
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:linear-gradient(45deg,#7c3aed,#ec4899);
  color:white;
  cursor:pointer;
  margin-top:10px;
}
button:hover{opacity:0.9;}
a{color:#cbd5f5;text-decoration:none;font-size:14px;}
a:hover{color:white;}
#msg{margin-top:10px;font-size:14px;text-align:center;}
#forgotBox{display:none;margin-top:15px;}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN FORM -->
<form id="loginForm">
<h2>🔐 Login</h2>

<input type="email" id="email" placeholder="Enter Email" required>
<input type="password" id="password" placeholder="Enter Password" required>

<p style="text-align:right;">
  <a href="#" onclick="openForgot()">Forgot Password?</a>
</p>

<button type="submit" onclick="">Login</button>

<p id="msg"></p>
</form>

<!-- FORGOT PASSWORD -->
<div id="forgotBox">
<h3>Reset Password</h3>

<input type="email" id="fpEmail" placeholder="Enter Email">
<button onclick="sendOTP()">Send OTP</button>

<input type="number" id="otp" placeholder="Enter OTP">
<input type="password" id="newPass" placeholder="New Password">

<button onclick="resetPassword()">Reset Password</button>
<button onclick="goBack()">⬅ Back to Login</button>

<p id="fpMsg"></p>
</div>

<p style="margin-top:15px;">
Don't have account? <a href="register.html">Register</a>
</p>

</div>

<script>
/* ================= LOGIN ================= */
document.getElementById("loginForm").addEventListener("submit", async function(e) {
  e.preventDefault(); // 🔥 stop page reload

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const msg = document.getElementById("msg");

  msg.style.color = "white";
  msg.textContent = "Logging in...";

  try {
    const res = await fetch("http://localhost:5000/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      credentials: "include", // 🔥 VERY IMPORTANT
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();
    console.log(data);

    if (res.ok) {
      msg.style.color = "lightgreen";
      msg.textContent = "Login successful! Redirecting...";

      setTimeout(() => {
        window.location.href = "Home.html"; // 🔥 ensure correct file name
      }, 1000);

    } else {
      msg.style.color = "red";
      msg.textContent = data.message;
    }

  } catch (err) {
    console.error(err);
    msg.style.color = "red";
    msg.textContent = "Server error";
  }
});

/* ================= FORGOT PASSWORD ================= */
function openForgot() {
  document.getElementById("loginForm").style.display = "none";
  document.getElementById("forgotBox").style.display = "block";
}

function goBack() {
  document.getElementById("loginForm").style.display = "block";
  document.getElementById("forgotBox").style.display = "none";
}

async function sendOTP() {
  const email = document.getElementById("fpEmail").value;
  const msg = document.getElementById("fpMsg");

  msg.textContent = "Sending OTP...";

  try {
    const res = await fetch("http://localhost:5000/forgot-password", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email })
    });

    const data = await res.json();
    msg.textContent = data.message;

  } catch (err) {
    msg.textContent = "Error sending OTP";
  }
}

async function resetPassword() {
  const email = document.getElementById("fpEmail").value;
  const otp = document.getElementById("otp").value;
  const newPassword = document.getElementById("newPass").value;
  const msg = document.getElementById("fpMsg");

  msg.textContent = "Resetting password...";

  try {
    const res = await fetch("http://localhost:5000/reset-password", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, otp, newPassword })
    });

    const data = await res.json();
    msg.textContent = data.message;

  } catch (err) {
    msg.textContent = "Error resetting password";
  }
}
</script>

</body>
</html>
